apiVersion: v1
kind: Service
metadata:
  name: fraud-detection-api
  namespace: default
  labels:
    app: fraud-detection-api
spec:
  type: ClusterIP  # Внутренний сервис
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: fraud-detection-api
---
# Опционально: LoadBalancer для внешнего доступа
apiVersion: v1
kind: Service
metadata:
  name: fraud-detection-api-lb
  namespace: default
  labels:
    app: fraud-detection-api
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: fraud-detection-api